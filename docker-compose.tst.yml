services:
  backend:
    build:
      context: .
    env_file: ./backend/.development.env
    environment:
      - "DATABASE_URL=postgres://postgres:abc123@postgres:5432/postgres"
      - "EXTRA_ARGS=$EXTRA_ARGS"
      - LOG_LEVEL=warn
      - MICROSERVICE_HOST=
    volumes:
      - ./backend/src/migrations:/app/src/migrations
    depends_on:
      postgres:
        condition: service_healthy
      testMySQL-e2e-testing:
        condition: service_healthy
      testPg-e2e-testing:
        condition: service_healthy
    # $EXTRA_ARGS is a single ava glob (quoted so the extglob reaches ava
    # intact instead of being expanded by the container's dash shell).
    command: ["/bin/sh", "-c", "pnpm test-all-parallel \"$EXTRA_ARGS\""]
    develop:
      watch:
        - action: rebuild
          path: ./backend/src

  testMySQL-e2e-testing:
    image: mysql:8.0.23
    ports:
      - 3308:3306
    tmpfs:
      - /var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123
      MYSQL_DATABASE: testDB
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  testPg-e2e-testing:
    image: postgres
    ports:
      - 9002:5432
    environment:
      POSTGRES_PASSWORD: 123
    command: postgres -c 'max_connections=300'
    tmpfs:
      - /var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  postgres:
    image: postgres
    ports:
      - 5432:5432
    environment:
      POSTGRES_PASSWORD: abc123
    command: postgres -c 'max_connections=300'
    tmpfs:
      - /var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  autoadmin-ws-server:
    build:
      context: autoadmin-ws-server
    ports:
      - 8008:8008
    env_file: ./autoadmin-ws-server/.ws-server-development.env
    volumes:
      - ./autoadmin-ws-server/dist:/app/dist
      - ./autoadmin-ws-server/src:/app/src
    links:
      - backend
    depends_on:
      - backend
