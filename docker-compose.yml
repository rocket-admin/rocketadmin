version: "3.9"
services:
  backend:
    build:
      context: .
    ports:
      - 3000:3000
    env_file: ./backend/.development.env
    volumes:
      - ./backend/dist:/app/dist
      - ./backend/src:/app/src
      - ./backend/src/migrations:/app/src/migrations
    depends_on:
      - postgres
      - testMySQL-e2e-testing
      - testPg-e2e-testing
      - mssql-e2e-testing
      - test-oracle-e2e-testing
      - test-ibm-db2-e2e-testing
      - test-mongo-e2e-testing
      - test-dynamodb-e2e-testing
      - test-elasticsearch-e2e-testing
      - cassandra-init
      - test-cassandra-e2e-testing
      - test-redis-e2e-testing
      - test-clickhouse-e2e-testing
    links:
      - postgres
      - testMySQL-e2e-testing
      - testPg-e2e-testing
      - mssql-e2e-testing
      - test-oracle-e2e-testing
      - test-ibm-db2-e2e-testing
      - test-mongo-e2e-testing
      - test-dynamodb-e2e-testing
      - test-elasticsearch-e2e-testing
      - test-cassandra-e2e-testing
      - test-redis-e2e-testing
      - test-clickhouse-e2e-testing
    command: ["pnpm", "start"]

  testMySQL-e2e-testing:
    image: mysql:8.0.23
    ports:
      - 3308:3306
    environment:
      MYSQL_ROOT_PASSWORD: 123
      MYSQL_DATABASE: testDB
    tmpfs:
      - /var/lib/mysql

  testPg-e2e-testing:
    image: postgres
    ports:
      - 9002:5432
    environment:
      POSTGRES_PASSWORD: 123
    command: postgres -c 'max_connections=300'
    tmpfs:
      - /var/lib/postgresql

  postgres:
    image: postgres
    ports:
      - 5432:5432
    environment:
      POSTGRES_PASSWORD: abc123
    command: postgres -c 'max_connections=300'
    tmpfs:
      - /var/lib/postgresql

  mssql-e2e-testing:
    image: mcr.microsoft.com/mssql/server:2019-latest
    environment:
      - SA_PASSWORD=yNuXf@6T#BgoQ%U6knMp
      - ACCEPT_EULA=Y
    ports:
      - "5434:1433"
    tmpfs:
      - /var/opt/mssql

  test-oracle-e2e-testing:
    image: gvenzl/oracle-xe
    ports:
      - 1521:1521
    environment:
      ORACLE_PASSWORD: 12345
    tmpfs:
      - /opt/oracle/oradata

  autoadmin-ws-server:
    build:
      context: autoadmin-ws-server
    ports:
      - 8008:8008
    env_file: ./autoadmin-ws-server/.ws-server-development.env
    volumes:
      - ./autoadmin-ws-server/dist:/app/dist
      - ./autoadmin-ws-server/src:/app/src
    links:
      - backend
    depends_on:
      - backend

  rocketadmin-private-microservice:
    build:
      context: ../rocketadmin-saas
      dockerfile: Dockerfile.test
    ports:
      - 3001:3001
    env_file: ../rocketadmin-saas/.env
    environment:
      # Path to the Go proxy's contract fixture (mounted below). Lets the
      # SaaS contract test find it regardless of on-disk layout.
      PROXY_CONTRACT_FIXTURE: /contract/fixtures.json
    volumes:
      # Shared wire-contract source of truth with the Go postgres-proxy.
      - ../postgres-proxy/contract:/contract:ro
    links:
      - backend
      - rocketadmin-private-microservice-test-database
    depends_on:
      - rocketadmin-private-microservice-test-database
    command: ["pnpm", "start"]

  rocketadmin-private-microservice-test-database:
    image: postgres
    ports:
      - 8001:5432
    environment:
      POSTGRES_PASSWORD: abc987
    command: postgres -c 'max_connections=300'
    tmpfs:
      - /var/lib/postgresql

  test-ibm-db2-e2e-testing:
    image: icr.io/db2_community/db2
    restart: always
    privileged: true
    environment:
      - LICENSE=accept
      - DB2INSTANCE=db2inst1
      - DB2INST1_PASSWORD=password
      - DBNAME=testdb
      - BLU=false
      - ENABLE_ORACLE_COMPATIBILITY=false
      - UPDATEAVAIL=NO
      - TO_CREATE_SAMPLEDB=true
      - REPODB=false
      - IS_OSXFS=false
      - PERSISTENT_HOME=true
      - HADR_ENABLED=false
      - ETCD_ENDPOINT=
      - ETCD_USERNAME=
      - ETCD_PASSWORD=
    ports:
      - 50000:50000

  test-mongo-e2e-testing:
    image: mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    ports:
      - 27017:27017
    tmpfs:
      - /data/db

  test-dynamodb-e2e-testing:
    image: amazon/dynamodb-local
    ports:
      - 8000:8000
    environment:
      - AWS_ACCESS_KEY_ID=SuperSecretAwsAccessKey
      - AWS_SECRET=SuperSecretAwsSecret

  test-elasticsearch-e2e-testing:
    image: elasticsearch:8.17.5
    ports:
      - 9200:9200
      - 9300:9300
    environment:
      - discovery.type=single-node
      - ELASTIC_PASSWORD=SuperSecretElasticPassword
      - xpack.security.enabled=true
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    tmpfs:
      - /usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s -u elastic:SuperSecretElasticPassword http://localhost:9200/_cluster/health | grep -E '\"status\":\"(green|yellow)\"'",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  test-cassandra-e2e-testing:
    image: cassandra:5.0.4
    ports:
      - 9042:9042
    environment:
      - CASSANDRA_CLUSTER_NAME=TestCluster
      - CASSANDRA_DC=TestDC
      - CASSANDRA_RACK=TestRack
      - MAX_HEAP_SIZE=768M
      - HEAP_NEWSIZE=128M
    mem_limit: 3g
    restart: always
    healthcheck:
      test:
        [
          "CMD",
          "cqlsh",
          "-u",
          "cassandra",
          "-p",
          "cassandra",
          "-e",
          "describe keyspaces",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  cassandra-init:
    image: cassandra:5.0.4
    depends_on:
      test-cassandra-e2e-testing:
        condition: service_healthy
    volumes:
      - ./init-cassandra.sh:/init-cassandra.sh
    command: ["/init-cassandra.sh"]
    restart: "no"

  test-redis-e2e-testing:
    image: redis:7.0.11
    ports:
      - 6379:6379
    command: ["redis-server", "--requirepass", "SuperSecretRedisPassword"]
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  test-clickhouse-e2e-testing:
    image: clickhouse/clickhouse-server:24.8
    restart: unless-stopped
    ports:
      - 8123:8123
      - 9000:9000
    environment:
      - CLICKHOUSE_DB=testdb
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=clickhouse_password
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    tmpfs:
      - /var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test:
        [
          "CMD",
          "clickhouse-client",
          "--user=default",
          "--password=clickhouse_password",
          "--query=SELECT 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  # === Postgres Proxy E2E Testing ===

  testPg-proxy-e2e:
    image: postgres:16
    ports:
      - 9003:5432
    environment:
      POSTGRES_PASSWORD: proxy_test_123
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    command: postgres -c 'max_connections=300' -c 'password_encryption=md5'
    tmpfs:
      - /var/lib/postgresql

  proxy-mock-api:
    build:
      context: ./test/proxy-mock-api
    ports:
      - 3333:3333
    environment:
      MOCK_API_PORT: 3333
      PROXY_API_KEY: test-proxy-api-key
      UPSTREAM_PG_HOST: testPg-proxy-e2e
      UPSTREAM_PG_PORT: 5432
      UPSTREAM_PG_DATABASE: postgres
      UPSTREAM_PG_USERNAME: postgres
      UPSTREAM_PG_PASSWORD: proxy_test_123
    depends_on:
      - testPg-proxy-e2e

  postgres-proxy:
    build:
      context: ../postgres-proxy
    ports:
      - 9005:5432
      - 8085:8080
    environment:
      PROXY_LISTEN_ADDR: ":5432"
      PROXY_HEALTH_ADDR: ":8080"
      PROXY_BACKEND_API_URL: "http://proxy-mock-api:3333"
      PROXY_API_KEY: "test-proxy-api-key"
      PROXY_USAGE_REPORT_INTERVAL: "10s"
      PROXY_LOG_LEVEL: "debug"
    depends_on:
      - proxy-mock-api
      - testPg-proxy-e2e

  rocketadmin-agent_mongo:
    build:
      context: .
      dockerfile: ./rocketadmin-agent/Dockerfile
    ports:
      - 8229:8229
    volumes:
      - ./rocketadmin-agent/dist:/app/dist
      - ./rocketadmin-agent/src:/app/src
    links:
      - autoadmin-ws-server
    depends_on:
      - autoadmin-ws-server
    environment:
      - REMOTE_WEBSOCKET_ADDRESS=ws://autoadmin-ws-server:8009
      - APPLICATION_CONFIG_FILE_NAME=.mongodb_test_agent_config.txt
    command: ["pnpm", "start:dev"]

  rocketadmin-agent_ibmdb2:
    build:
      context: .
      dockerfile: ./rocketadmin-agent/Dockerfile
    ports:
      - 8308:8308
    volumes:
      - ./rocketadmin-agent/dist:/app/dist
      - ./rocketadmin-agent/src:/app/src
      - ./rocketadmin-agent/wait-for-db2.sh:/app/wait-for-db2.sh
      - ./rocketadmin-agent/wait-for-db2.js:/app/wait-for-db2.js
    links:
      - autoadmin-ws-server
    depends_on:
      - autoadmin-ws-server
    environment:
      - REMOTE_WEBSOCKET_ADDRESS=ws://autoadmin-ws-server:8009
      - APPLICATION_CONFIG_FILE_NAME=.ibmdb2_test_agent_config.txt
    command: ["node", "/app/wait-for-db2.js"]

  rocketadmin-agent_oracle:
    build:
      context: .
      dockerfile: ./rocketadmin-agent/Dockerfile
    ports:
      - 8088:8088
    volumes:
      - ./rocketadmin-agent/dist:/app/dist
      - ./rocketadmin-agent/src:/app/src
    links:
      - autoadmin-ws-server
    depends_on:
      - autoadmin-ws-server
    environment:
      - REMOTE_WEBSOCKET_ADDRESS=ws://autoadmin-ws-server:8009
      - APPLICATION_CONFIG_FILE_NAME=.oracle_test_agent_config.txt
    command: ["pnpm", "start:dev"]

  rocketadmin-agent_postgres:
    build:
      context: .
      dockerfile: ./rocketadmin-agent/Dockerfile
    ports:
      - 8098:8098
    volumes:
      - ./rocketadmin-agent/dist:/app/dist
      - ./rocketadmin-agent/src:/app/src
    links:
      - autoadmin-ws-server
    depends_on:
      - autoadmin-ws-server
    environment:
      - REMOTE_WEBSOCKET_ADDRESS=ws://autoadmin-ws-server:8009
      - APPLICATION_CONFIG_FILE_NAME=.postgres_test_agent_config.txt
    command: ["pnpm", "start:dev"]

  rocketadmin-agent_mysql:
    build:
      context: .
      dockerfile: ./rocketadmin-agent/Dockerfile
    ports:
      - 8108:8108
    volumes:
      - ./rocketadmin-agent/dist:/app/dist
      - ./rocketadmin-agent/src:/app/src
    links:
      - autoadmin-ws-server
    depends_on:
      - autoadmin-ws-server
    environment:
      - REMOTE_WEBSOCKET_ADDRESS=ws://autoadmin-ws-server:8009
      - APPLICATION_CONFIG_FILE_NAME=.mysql_test_agent_config.txt
    command: ["pnpm", "start:dev"]

  rocketadmin-agent_mssql:
    build:
      context: .
      dockerfile: ./rocketadmin-agent/Dockerfile
    ports:
      - 8118:8118
    volumes:
      - ./rocketadmin-agent/dist:/app/dist
      - ./rocketadmin-agent/src:/app/src
    links:
      - autoadmin-ws-server
    depends_on:
      - autoadmin-ws-server
    environment:
      - REMOTE_WEBSOCKET_ADDRESS=ws://autoadmin-ws-server:8009
      - APPLICATION_CONFIG_FILE_NAME=.mssql_test_agent_config.txt
    command: ["pnpm", "start:dev"]

  rocketadmin-agent_cassandra:
    build:
      context: .
      dockerfile: ./rocketadmin-agent/Dockerfile
    ports:
      - 8128:8128
    volumes:
      - ./rocketadmin-agent/dist:/app/dist
      - ./rocketadmin-agent/src:/app/src
    links:
      - autoadmin-ws-server
      - test-cassandra-e2e-testing
    depends_on:
      test-cassandra-e2e-testing:
        condition: service_healthy
      cassandra-init:
        condition: service_completed_successfully
      autoadmin-ws-server:
        condition: service_started
    environment:
      - REMOTE_WEBSOCKET_ADDRESS=ws://autoadmin-ws-server:8009
      - APPLICATION_CONFIG_FILE_NAME=.cassandra_test_agent_config.txt
    command: ["pnpm", "start:dev"]

  rocketadmin-agent_redis:
    build:
      context: .
      dockerfile: ./rocketadmin-agent/Dockerfile
    ports:
      - 8138:8138
    volumes:
      - ./rocketadmin-agent/dist:/app/dist
      - ./rocketadmin-agent/src:/app/src
    links:
      - autoadmin-ws-server
      - test-redis-e2e-testing
    depends_on:
      - autoadmin-ws-server
      - test-redis-e2e-testing
    environment:
      - REMOTE_WEBSOCKET_ADDRESS=ws://autoadmin-ws-server:8009
      - APPLICATION_CONFIG_FILE_NAME=.redis_test_agent_config.txt
    command: ["pnpm", "start:dev"]

  rocketadmin-agent_clickhouse:
    build:
      context: .
      dockerfile: ./rocketadmin-agent/Dockerfile
    ports:
      - 8148:8148
    volumes:
      - ./rocketadmin-agent/dist:/app/dist
      - ./rocketadmin-agent/src:/app/src
    links:
      - autoadmin-ws-server
      - test-clickhouse-e2e-testing
    depends_on:
      - autoadmin-ws-server
      - test-clickhouse-e2e-testing
    environment:
      - REMOTE_WEBSOCKET_ADDRESS=ws://autoadmin-ws-server:8009
      - APPLICATION_CONFIG_FILE_NAME=.clickhouse_test_agent_config.txt
    command: ["pnpm", "start:dev"]
