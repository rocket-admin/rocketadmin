<span class="field-view-value" [class.out-of-threshold]="!!isOutOfThreshold">
    {{displayValue}}
    @if (isOutOfThreshold === 'down') {
    <mat-icon class="out-of-threshold__icon">north</mat-icon>
    }
    @if (isOutOfThreshold === 'up') {
    <mat-icon class="out-of-threshold__icon">south</mat-icon>
    }
</span>
