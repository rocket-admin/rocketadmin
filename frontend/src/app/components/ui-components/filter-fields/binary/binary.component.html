<div class="filter-row">
    <mat-form-field class="comparator-field" appearance="outline">
        <mat-select [(ngModel)]="filterMode" (ngModelChange)="onFilterModeChange($event)">
            <mat-option value="eq">equal</mat-option>
            <mat-option value="contains">contains</mat-option>
            <mat-option value="startswith">starts with</mat-option>
            <mat-option value="empty">is empty</mat-option>
        </mat-select>
    </mat-form-field>

    @if (filterMode !== 'empty') {
        <mat-form-field class="value-field" appearance="outline">
            <mat-label>{{normalizedLabel()}} (hex)</mat-label>
            <input matInput type="text" hexValidator
                name="{{label()}}-{{key()}}"
                #inputElement
                #hexInput="ngModel"
                [required]="required()" [disabled]="disabled()" [readonly]="readonly()"
                placeholder="48656c6c6f"
                [(ngModel)]="hexValue" (ngModelChange)="onHexValueChange($event)">
            @if (hexInput.errors?.isInvalidHex) {
                <mat-error>Invalid hex.</mat-error>
            }
        </mat-form-field>
    }
</div>
