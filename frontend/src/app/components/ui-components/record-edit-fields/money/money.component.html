<div class="money-widget">
  <div class="money-input-container">
    <!-- Currency selector (if enabled) -->
    @if (showCurrencySelector) {
      <mat-form-field
        class="money-selector"
        appearance="outline">
        <mat-label>Currency</mat-label>
        <mat-select
          [(value)]="selectedCurrency"
          (selectionChange)="onCurrencyChange()"
          [disabled]="disabled()"
          attr.data-testid="record-{{label()}}-money-selector">
          @for (currency of currencies; track currency.code) {
            <mat-option [value]="currency.code">
              {{ displayCurrencyFn(currency) }}
            </mat-option>
          }
        </mat-select>
      </mat-form-field>
    }

    <!-- Amount input -->
    <mat-form-field
      class="amount-input"
      appearance="outline">
      <mat-label>{{normalizedLabel()}}</mat-label>
      @if (selectedCurrencyData && displayAmount) {
        <span matTextPrefix>{{selectedCurrencyData.symbol}}</span>
      }
      <input
        matInput
        type="text"
        [(ngModel)]="displayAmount"
        (ngModelChange)="onAmountChange()"
        (blur)="onAmountBlur()"
        [placeholder]="placeholder"
        [required]="required()"
        [disabled]="disabled()"
        [readonly]="readonly()"
        attr.data-testid="record-{{label()}}-money-amount"
        [step]="0.01">
    </mat-form-field>
  </div>

</div>
