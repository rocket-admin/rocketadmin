<mat-form-field class="timezone-form-field" appearance="outline">
  <mat-label>{{normalizedLabel()}}</mat-label>
  <mat-select
    name="{{label()}}-{{key()}}"
    [required]="required()"
    [disabled]="disabled()"
    [readonly]="readonly()"
    attr.data-testid="record-{{label()}}-timezone"
    [(ngModel)]="value"
    (ngModelChange)="onFieldChange.emit($event)">
    @for (timezone of timezones; track timezone.value) {
      <mat-option [value]="timezone.value">
        {{timezone.label}}
      </mat-option>
    }
  </mat-select>
</mat-form-field>
