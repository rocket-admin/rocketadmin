<div class="feature-notification">
    <div class="feature-notification__content">
        <div class="feature-notification__animation" aria-hidden="true">
            <svg viewBox="0 0 360 180" xmlns="http://www.w3.org/2000/svg" class="fn-svg">
                <defs>
                    <pattern id="fn-grid" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
                        <circle cx="1" cy="1" r="1" fill="currentColor" opacity="0.12"></circle>
                    </pattern>
                    <linearGradient id="fn-bg" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0%" stop-color="#eef2ff" />
                        <stop offset="100%" stop-color="#f5f1ff" />
                    </linearGradient>
                </defs>

                <rect class="fn-bg" width="360" height="180" rx="8" fill="url(#fn-bg)"></rect>
                <rect width="360" height="180" rx="8" fill="url(#fn-grid)" class="fn-grid"></rect>

                <!-- AI prompt bubble -->
                <g class="fn-prompt">
                    <rect x="14" y="22" width="120" height="34" rx="17" fill="#fff" stroke="#c8d0ff" stroke-width="1"></rect>
                    <circle cx="32" cy="39" r="7" fill="#6384ff"></circle>
                    <path d="M32 35 L33.4 38 L36.5 38 L34 40 L34.9 43 L32 41.2 L29.1 43 L30 40 L27.5 38 L30.6 38 Z" fill="#fff"></path>
                    <rect x="46" y="32" width="68" height="4" rx="2" fill="#c8d0ff"></rect>
                    <rect x="46" y="42" width="50" height="4" rx="2" fill="#dde2ff"></rect>
                </g>

                <!-- Table 1: users -->
                <g class="fn-table fn-table--1">
                    <rect x="22" y="78" width="92" height="78" rx="6" fill="#fff" stroke="#c4cdff" stroke-width="1.2"></rect>
                    <rect x="22" y="78" width="92" height="20" rx="6" fill="#6384ff"></rect>
                    <text x="32" y="92" font-size="11" font-weight="600" fill="#fff" font-family="system-ui, sans-serif">users</text>
                    <text x="32" y="116" font-size="10" fill="#445" font-family="system-ui, sans-serif">id</text>
                    <text x="32" y="132" font-size="10" fill="#445" font-family="system-ui, sans-serif">email</text>
                    <text x="32" y="148" font-size="10" fill="#445" font-family="system-ui, sans-serif">name</text>
                </g>

                <!-- Table 2: posts -->
                <g class="fn-table fn-table--2">
                    <rect x="148" y="50" width="92" height="78" rx="6" fill="#fff" stroke="#c4cdff" stroke-width="1.2"></rect>
                    <rect x="148" y="50" width="92" height="20" rx="6" fill="#8b6dff"></rect>
                    <text x="158" y="64" font-size="11" font-weight="600" fill="#fff" font-family="system-ui, sans-serif">posts</text>
                    <text x="158" y="88" font-size="10" fill="#445" font-family="system-ui, sans-serif">id</text>
                    <text x="158" y="104" font-size="10" fill="#445" font-family="system-ui, sans-serif">user_id</text>
                    <text x="158" y="120" font-size="10" fill="#445" font-family="system-ui, sans-serif">title</text>
                </g>

                <!-- Table 3: comments -->
                <g class="fn-table fn-table--3">
                    <rect x="252" y="92" width="92" height="64" rx="6" fill="#fff" stroke="#c4cdff" stroke-width="1.2"></rect>
                    <rect x="252" y="92" width="92" height="20" rx="6" fill="#ff8bb1"></rect>
                    <text x="262" y="106" font-size="11" font-weight="600" fill="#fff" font-family="system-ui, sans-serif">comments</text>
                    <text x="262" y="130" font-size="10" fill="#445" font-family="system-ui, sans-serif">id</text>
                    <text x="262" y="146" font-size="10" fill="#445" font-family="system-ui, sans-serif">post_id</text>
                </g>

                <!-- Connection arrows -->
                <path class="fn-link fn-link--1" d="M 114 110 C 130 110 130 90 148 90" stroke="#6384ff" stroke-width="1.5" fill="none" stroke-linecap="round"></path>
                <path class="fn-link fn-link--2" d="M 240 100 C 248 100 248 120 252 120" stroke="#8b6dff" stroke-width="1.5" fill="none" stroke-linecap="round"></path>

                <!-- Sparkles -->
                <g class="fn-sparkle fn-sparkle--a">
                    <path d="M120 18 L121.6 22 L125.6 23.6 L121.6 25.2 L120 29.2 L118.4 25.2 L114.4 23.6 L118.4 22 Z" fill="#ffb800"></path>
                </g>
                <g class="fn-sparkle fn-sparkle--b">
                    <path d="M310 40 L311 42.6 L313.6 43.6 L311 44.6 L310 47.2 L309 44.6 L306.4 43.6 L309 42.6 Z" fill="#6384ff"></path>
                </g>
                <g class="fn-sparkle fn-sparkle--c">
                    <path d="M340 130 L341 132.6 L343.6 133.6 L341 134.6 L340 137.2 L339 134.6 L336.4 133.6 L339 132.6 Z" fill="#ff8bb1"></path>
                </g>

                <!-- Cursor -->
                <g class="fn-cursor">
                    <path d="M0 0 L0 14 L4 11 L7 17 L10 16 L7 9 L12 9 Z" fill="#1f2937" stroke="#fff" stroke-width="1"></path>
                </g>
            </svg>
        </div>
        <h1 class="feature-notification__title">New: Edit Schema with AI</h1>
        <p class="feature-notification__description">
            Describe the tables you need and let AI generate the schema for you.
        </p>
    </div>
    <div class="actions">
        <button type="button" mat-flat-button color="accent" class="actions__primary" (click)="dismiss.emit()">
            Got it
        </button>
    </div>
</div>
