<div class="feature-notification">
    <div class="feature-notification__content">
        <div class="feature-notification__animation" aria-hidden="true">
            <svg viewBox="0 0 360 180" xmlns="http://www.w3.org/2000/svg" class="fn-svg">
                <defs>
                    <pattern id="fn-grid" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
                        <circle cx="1" cy="1" r="1" fill="currentColor" opacity="0.12"></circle>
                    </pattern>
                    <linearGradient id="fn-bg" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0%" stop-color="#eef2ff" />
                        <stop offset="100%" stop-color="#f5f1ff" />
                    </linearGradient>
                </defs>

                <rect class="fn-bg" width="360" height="180" rx="8" fill="url(#fn-bg)"></rect>
                <rect width="360" height="180" rx="8" fill="url(#fn-grid)" class="fn-grid"></rect>

                <!-- Connection card (the "where to find" hint) — slim with Edit schema button on the right -->
                <g class="fn-connection-card">
                    <rect x="14" y="12" width="332" height="36" rx="7" fill="#fff" stroke="#d6dcff" stroke-width="1.2"></rect>

                    <!-- DB icon -->
                    <circle cx="32" cy="30" r="9" fill="#eef2ff"></circle>
                    <ellipse cx="32" cy="27" rx="5" ry="1.4" fill="none" stroke="#6384ff" stroke-width="1.2"></ellipse>
                    <ellipse cx="32" cy="30" rx="5" ry="1.4" fill="none" stroke="#6384ff" stroke-width="1.2"></ellipse>
                    <path d="M27 27 L27 33 M37 27 L37 33" stroke="#6384ff" stroke-width="1.2" stroke-linecap="round"></path>

                    <!-- Database name + type label -->
                    <text x="50" y="27" font-size="10" font-weight="600" fill="#1f2937" font-family="system-ui, sans-serif">my_database</text>
                    <text x="50" y="40" font-size="8.5" fill="#9ca3af" font-family="system-ui, sans-serif">PostgreSQL</text>

                    <!-- "Edit schema" button on the right (highlight target) -->
                    <g class="fn-schema-target">
                        <!-- Pulse rings around the button -->
                        <rect class="fn-pulse fn-pulse--1" x="232" y="20" width="104" height="20" rx="5" fill="none" stroke="#6384ff" stroke-width="1.5"></rect>
                        <rect class="fn-pulse fn-pulse--2" x="232" y="20" width="104" height="20" rx="5" fill="none" stroke="#6384ff" stroke-width="1.5"></rect>
                        <!-- AI sparkle icon -->
                        <path d="M244 31.5 L245.4 34.1 L248 35.3 L245.4 36.5 L244 39.1 L242.6 36.5 L240 35.3 L242.6 34.1 Z" fill="#2563eb"></path>
                        <!-- Label -->
                        <text x="254" y="34.2" font-size="10" font-weight="500" fill="#4f5b75" font-family="system-ui, sans-serif">Edit schema</text>
                        <!-- Trailing arrow that appears on hover -->
                        <path class="fn-edit-schema-arrow" d="M308 34.5 L314 34.5 M311.5 31.7 L314.3 34.5 L311.5 37.3" stroke="#6384ff" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" fill="none"></path>
                    </g>
                </g>

                <!-- Cursor that moves to the schema icon -->
                <g class="fn-pointer">
                    <path d="M0 0 L0 14 L4 11 L7 17 L10 16 L7 9 L12 9 Z" fill="#1f2937" stroke="#fff" stroke-width="1"></path>
                </g>

                <!-- Mini schema diagram (the result) — wavy layout -->
                <g class="fn-schema-result">
                    <!-- Table 1: users -->
                    <g class="fn-table fn-table--1">
                        <rect x="22" y="92" width="86" height="72" rx="6" fill="#fff" stroke="#c4cdff" stroke-width="1.2"></rect>
                        <rect x="22" y="92" width="86" height="18" rx="6" fill="#6384ff"></rect>
                        <text x="32" y="105" font-size="10" font-weight="600" fill="#fff" font-family="system-ui, sans-serif">users</text>
                        <text x="32" y="126" font-size="9" fill="#445" font-family="system-ui, sans-serif">id</text>
                        <text x="32" y="140" font-size="9" fill="#445" font-family="system-ui, sans-serif">email</text>
                        <text x="32" y="154" font-size="9" fill="#445" font-family="system-ui, sans-serif">name</text>
                    </g>

                    <!-- Table 2: posts (higher — "wave") -->
                    <g class="fn-table fn-table--2">
                        <rect x="138" y="68" width="86" height="72" rx="6" fill="#fff" stroke="#c4cdff" stroke-width="1.2"></rect>
                        <rect x="138" y="68" width="86" height="18" rx="6" fill="#8b6dff"></rect>
                        <text x="148" y="81" font-size="10" font-weight="600" fill="#fff" font-family="system-ui, sans-serif">posts</text>
                        <text x="148" y="102" font-size="9" fill="#445" font-family="system-ui, sans-serif">id</text>
                        <text x="148" y="116" font-size="9" fill="#445" font-family="system-ui, sans-serif">user_id</text>
                        <text x="148" y="130" font-size="9" fill="#445" font-family="system-ui, sans-serif">title</text>
                    </g>

                    <!-- Table 3: comments (lower — "wave") -->
                    <g class="fn-table fn-table--3">
                        <rect x="254" y="100" width="86" height="64" rx="6" fill="#fff" stroke="#c4cdff" stroke-width="1.2"></rect>
                        <rect x="254" y="100" width="86" height="18" rx="6" fill="#ff8bb1"></rect>
                        <text x="264" y="113" font-size="10" font-weight="600" fill="#fff" font-family="system-ui, sans-serif">comments</text>
                        <text x="264" y="134" font-size="9" fill="#445" font-family="system-ui, sans-serif">id</text>
                        <text x="264" y="148" font-size="9" fill="#445" font-family="system-ui, sans-serif">post_id</text>
                    </g>

                    <!-- Wavy curved relationships -->
                    <path class="fn-link fn-link--1" d="M 108 124 C 124 124 124 104 138 104" stroke="#6384ff" stroke-width="1.6" fill="none" stroke-linecap="round"></path>
                    <path class="fn-link fn-link--2" d="M 224 108 C 240 108 240 130 254 130" stroke="#8b6dff" stroke-width="1.6" fill="none" stroke-linecap="round"></path>

                    <!-- Sparkle -->
                    <g class="fn-sparkle">
                        <path d="M120 64 L122 69 L127 70 L122 71 L120 76 L118 71 L113 70 L118 69 Z" fill="#ffb800"></path>
                    </g>
                </g>
            </svg>
        </div>
        <h1 class="feature-notification__title">New: Create &amp; Edit Schema with AI</h1>
        <p class="feature-notification__description">
            Create and edit your database tables — just describe what you need and AI does the rest.
        </p>
    </div>
    <div class="actions">
        <button type="button" mat-flat-button color="accent" class="actions__primary" (click)="dismiss.emit()">
            Got it
        </button>
    </div>
</div>
